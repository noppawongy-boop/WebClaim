<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Claim Log</title>
  <style>
    :root{--ink:#17212b;--muted:#667085;--line:#e4e7ec;--brand:#0f766e;--brand2:#115e59;--bg:#f6f8fa;--danger:#b42318}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Tahoma,sans-serif}
    header{background:linear-gradient(135deg,#0f766e,#164e63);color:#fff;padding:28px max(20px,calc((100% - 1320px)/2))}
    header h1{margin:0 0 6px;font-size:clamp(25px,4vw,38px)}header p{margin:0;opacity:.86}
    main{max-width:1320px;margin:auto;padding:22px}.toolbar,.panel{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 2px 8px #1018280a}
    .toolbar{padding:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
    input,select,textarea,button{font:inherit}input,select,textarea{border:1px solid #cfd4dc;border-radius:9px;padding:10px 11px;background:#fff;color:var(--ink)}
    #search{min-width:250px;flex:1}button,.button{border:0;border-radius:9px;padding:10px 14px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;font-weight:650}
    .primary{background:var(--brand);color:#fff}.primary:hover{background:var(--brand2)}.secondary{background:#eef2f6;color:#344054}.danger{background:#fff1f0;color:var(--danger)}
    .stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:16px}.stat{padding:16px}.stat b{font-size:25px;display:block}.stat span{color:var(--muted);font-size:13px}
    .table-wrap{overflow:auto}.panel table{width:100%;border-collapse:collapse;min-width:900px}th,td{text-align:left;padding:12px;border-bottom:1px solid var(--line);vertical-align:top}th{font-size:12px;color:var(--muted);background:#f9fafb;position:sticky;top:0}td{font-size:14px}.empty{text-align:center;padding:48px;color:var(--muted)}
    .tag{display:inline-block;background:#e6f4f1;color:#07665e;border-radius:99px;padding:4px 9px;font-size:12px;font-weight:700}.actions{white-space:nowrap}.actions button{padding:7px 9px;margin-right:4px}
    dialog{border:0;border-radius:16px;padding:0;width:min(900px,calc(100% - 24px));max-height:92vh;box-shadow:0 24px 70px #10182855}dialog::backdrop{background:#10182899}.modal-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.modal-head h2{margin:0;font-size:20px}.modal-body{padding:20px;overflow:auto;max-height:calc(92vh - 128px)}
    form .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}label{display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:650}label.full{grid-column:1/-1}textarea{min-height:85px;resize:vertical}.modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px}.close{background:transparent;font-size:22px;padding:4px 10px}.notice{padding:10px 13px;border-radius:9px;background:#fffaeb;color:#854a0e;font-size:13px;margin-bottom:14px}.receipt{max-width:100%;max-height:360px;border-radius:10px;border:1px solid var(--line);object-fit:contain}.hidden{display:none!important}.toast{position:fixed;right:20px;bottom:20px;background:#17212b;color:#fff;padding:11px 15px;border-radius:9px;box-shadow:0 8px 30px #0004;z-index:10}
    @media(max-width:700px){main{padding:12px}.stats{grid-template-columns:1fr}.toolbar>*{width:100%}form .grid{grid-template-columns:1fr}label.full{grid-column:auto}}
  </style>
</head>
<body>
  <header><h1>Claim Log</h1><p>ระบบบันทึกและติดตามการเคลมสินค้า</p></header>
  <main>
    <div id="loadNotice" class="notice hidden"></div>
    <section class="stats">
      <div class="panel stat"><b id="totalCount">0</b><span>รายการทั้งหมด</span></div>
      <div class="panel stat"><b id="branchCount">0</b><span>สาขา</span></div>
      <div class="panel stat"><b id="todayCount">0</b><span>ติดต่อวันนี้</span></div>
    </section>
    <section class="toolbar">
      <input id="search" type="search" placeholder="ค้นหาลูกค้า, SKU, สาขา, เลขออเดอร์...">
      <select id="typeFilter"><option value="">ทุกประเภทเคลม</option></select>
      <button class="primary" id="addBtn">+ เพิ่มรายการ</button>
      <button class="secondary" id="importBtn">นำเข้า JSON</button>
      <button class="secondary" id="exportBtn">ส่งออก JSON</button>
      <input id="fileInput" class="hidden" type="file" accept="application/json,.json">
    </section>
    <section class="panel table-wrap"><table><thead><tr><th>วันที่ติดต่อ</th><th>ลูกค้า</th><th>สาขา</th><th>สินค้า / SKU</th><th>ประเภท</th><th>การจัดส่ง</th><th>จัดการ</th></tr></thead><tbody id="rows"></tbody></table><div id="empty" class="empty hidden">ไม่พบรายการ</div></section>
  </main>
  <dialog id="editor">
    <form id="claimForm">
      <div class="modal-head"><h2 id="formTitle">เพิ่มรายการเคลม</h2><button type="button" class="close" data-close>×</button></div>
      <div class="modal-body"><div class="grid">
        <input type="hidden" name="id">
        <label>รหัสสาขา<input name="branchCode"></label><label>ชื่อสาขา<input name="branchName"></label>
        <label>ประเภทเคลม<input name="claimType"></label><label>รายละเอียดอื่น<input name="otherDetail"></label>
        <label>ช่องทางซื้อ<input name="purchaseChannel"></label><label>เลขออเดอร์<input name="orderNumber"></label>
        <label>วันที่ซื้อ<input name="purchaseDate" type="date"></label><label>วันที่ติดต่อ<input name="contactDate" type="date"></label>
        <label>สินค้า / รุ่น<input name="product"></label><label>SKU<input name="productSku"></label>
        <label class="full">ชื่อลูกค้า<input name="customerName"></label><label class="full">หมายเหตุ<textarea name="notes"></textarea></label>
        <label>รุ่นที่แก้ไข<input name="resolvedModel"></label><label>SKU ที่แก้ไข<input name="resolvedSku"></label>
        <label>วันที่คืนสินค้า<input name="returnDate" type="date"></label><label>บริษัทขนส่ง<input name="courier"></label>
        <label>เลขติดตาม<input name="trackingNumber"></label><label>วิธีส่งมอบ<input name="deliveryMethod"></label>
        <label class="full">รายละเอียดการแก้ไข<textarea name="resolutionNotes"></textarea></label>
        <label class="full">รูปใบเสร็จ/หลักฐาน<input id="receiptFile" type="file" accept="image/*"><small id="receiptStatus"></small><img id="receiptPreview" class="receipt hidden" alt="รูปหลักฐาน"></label>
      </div></div>
      <div class="modal-foot"><button type="button" class="secondary" data-close>ยกเลิก</button><button class="primary" type="submit">บันทึก</button></div>
    </form>
  </dialog>
  <script>
    const STORAGE='claim-log-data-v1';
    const fields=['id','branchCode','branchName','claimType','otherDetail','purchaseChannel','orderNumber','purchaseDate','contactDate','product','productSku','customerName','notes','resolvedModel','resolvedSku','returnDate','courier','trackingNumber','deliveryMethod','resolutionNotes'];
    let claims=[], editingReceipt='';
    const $=s=>document.querySelector(s), esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function toast(msg){const e=document.createElement('div');e.className='toast';e.textContent=msg;document.body.append(e);setTimeout(()=>e.remove(),2200)}
    function persist(){localStorage.setItem(STORAGE,JSON.stringify(claims))}
    async function boot(){
      const local=localStorage.getItem(STORAGE);
      if(local){try{claims=JSON.parse(local)}catch{localStorage.removeItem(STORAGE)}}
      if(!local){try{const r=await fetch('data.json',{cache:'no-store'});if(!r.ok)throw 0;claims=await r.json();persist()}catch{$('#loadNotice').classList.remove('hidden');$('#loadNotice').textContent='เปิดผ่านไฟล์โดยตรงจึงโหลด data.json ไม่ได้ กรุณากด “นำเข้า JSON” หรือเปิดผ่าน GitHub Pages';}}
      render();
    }
    function render(){
      const q=$('#search').value.trim().toLowerCase(), type=$('#typeFilter').value;
      const filtered=claims.filter(x=>(!type||x.claimType===type)&&(!q||[x.customerName,x.productSku,x.product,x.branchCode,x.branchName,x.orderNumber,x.trackingNumber].some(v=>String(v??'').toLowerCase().includes(q))));
      $('#totalCount').textContent=claims.length;$('#branchCount').textContent=new Set(claims.map(x=>x.branchCode||x.branchName).filter(Boolean)).size;
      const today=new Date().toLocaleDateString('sv-SE');$('#todayCount').textContent=claims.filter(x=>x.contactDate===today).length;
      const current=$('#typeFilter').value, types=[...new Set(claims.map(x=>x.claimType).filter(Boolean))].sort();
      $('#typeFilter').innerHTML='<option value="">ทุกประเภทเคลม</option>'+types.map(v=>`<option ${v===current?'selected':''}>${esc(v)}</option>`).join('');
      $('#rows').innerHTML=filtered.map(x=>`<tr><td>${esc(x.contactDate||'-')}</td><td><b>${esc(x.customerName||'-')}</b><br><small>${esc(x.orderNumber||'')}</small></td><td>${esc(x.branchName||'-')}<br><small>${esc(x.branchCode||'')}</small></td><td>${esc(x.product||'-')}<br><small>${esc(x.productSku||'')}</small></td><td><span class="tag">${esc(x.claimType||'-')}</span></td><td>${esc(x.courier||x.deliveryMethod||'-')}<br><small>${esc(x.trackingNumber||'')}</small></td><td class="actions"><button class="secondary" data-edit="${esc(x.id)}">แก้ไข</button><button class="danger" data-delete="${esc(x.id)}">ลบ</button></td></tr>`).join('');
      $('#empty').classList.toggle('hidden',filtered.length>0);$('table').classList.toggle('hidden',filtered.length===0);
    }
    function openEditor(item={}){
      $('#claimForm').reset();$('#formTitle').textContent=item.id?'แก้ไขรายการเคลม':'เพิ่มรายการเคลม';
      for(const f of fields){const el=$(`#claimForm [name="${f}"]`);if(el)el.value=item[f]??''}
      editingReceipt=item.receipt||'';$('#receiptStatus').textContent=editingReceipt?'มีรูปหลักฐานแล้ว เลือกไฟล์ใหม่เพื่อแทนที่':'';
      $('#receiptPreview').classList.toggle('hidden',!editingReceipt);if(editingReceipt)$('#receiptPreview').src=editingReceipt;
      $('#editor').showModal();
    }
    $('#claimForm').addEventListener('submit',e=>{e.preventDefault();const fd=new FormData(e.currentTarget), item={};for(const f of fields)item[f]=String(fd.get(f)??'').trim();
      item.id=item.id||('c'+Date.now().toString(36)+Math.random().toString(36).slice(2,7));item.receipt=editingReceipt;const old=claims.find(x=>x.id===item.id);
      if(old){Object.assign(old,item)}else{item.problems=[];item.createdAt=new Date().toISOString();claims.unshift(item)}persist();render();$('#editor').close();toast('บันทึกเรียบร้อย');});
    $('#rows').addEventListener('click',e=>{const edit=e.target.dataset.edit, del=e.target.dataset.delete;if(edit)openEditor(claims.find(x=>x.id===edit));if(del&&confirm('ยืนยันการลบรายการนี้?')){claims=claims.filter(x=>x.id!==del);persist();render();toast('ลบรายการแล้ว')}});
    $('#receiptFile').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{editingReceipt=r.result;$('#receiptPreview').src=r.result;$('#receiptPreview').classList.remove('hidden');$('#receiptStatus').textContent=f.name};r.readAsDataURL(f)});
    $('#addBtn').onclick=()=>openEditor();document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>$('#editor').close());$('#search').oninput=render;$('#typeFilter').onchange=render;
    $('#importBtn').onclick=()=>$('#fileInput').click();$('#fileInput').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!Array.isArray(d))throw 0;claims=d;persist();render();toast(`นำเข้า ${d.length} รายการแล้ว`)}catch{alert('ไฟล์ JSON ไม่ถูกต้อง')}};r.readAsText(f,'utf-8');e.target.value=''};
    $('#exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify(claims,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`claim-log-backup-${new Date().toLocaleDateString('sv-SE')}.json`;a.click();URL.revokeObjectURL(a.href)};
    boot();
  </script>
</body>
</html>
